# CHT - FS values are in Fahrenheit
# 0x08E8/0x0980/0x0A18/0x0AB0 are handled by offset_table.h (CHT_deg_cel[N] * 1.8 + 32).
# Only 0x3858 (secondary CHT1 mirror) is defined here as it has no offset_table.h equivalent.
Dataref CHT1	sim/cockpit2/engine/indicators/CHT_deg_cel[0]		floatarray
Offset	0x3858	FLOAT64	2	r	$CHT1 1.8 * 32 +

# EGT - FS values are in Rankine
